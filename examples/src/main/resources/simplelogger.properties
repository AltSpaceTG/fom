# Keep example console output focused. The engine logs each process's
# init/load start + completion (with timing) on io.fom.fsm.ProcessFSM at INFO,
# so we enable just that logger to show the library doing the narration —
# while everything else (e.g. Fury's startup chatter) stays at warn.
org.slf4j.simpleLogger.defaultLogLevel=warn
org.slf4j.simpleLogger.log.io.fom.fsm.ProcessFSM=info
org.slf4j.simpleLogger.showThreadName=false
org.slf4j.simpleLogger.showDateTime=false
org.slf4j.simpleLogger.showLogName=false
org.slf4j.simpleLogger.levelInBrackets=true
